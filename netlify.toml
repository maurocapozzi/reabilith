[build]
  # Diz ao Netlify que o site compilado (HTML/CSS) está na pasta "public"
  publish = "public"

# ==========================================
# OTIMIZAÇÃO DE PERFORMANCE (Lighthouse Cache)
# ==========================================

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
